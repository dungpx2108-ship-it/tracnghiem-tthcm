<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Trắc Nghiệm Tư Tưởng Hồ Chí Minh - C4,5,6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f0ebe3;color:#2c1810;min-height:100vh;padding-bottom:80px
}

/* TOP BAR */
.topbar{
  background:#b71c1c;color:#fff;padding:12px 16px;text-align:center;
  font-weight:700;font-size:17px;position:sticky;top:0;z-index:10;
  box-shadow:0 2px 6px rgba(0,0,0,.25)
}

/* INTRO */
.intro{max-width:600px;margin:24px auto;padding:0 16px;text-align:center}
.intro h2{color:#b71c1c;font-size:22px;margin-bottom:4px}
.intro .sub{color:#8d6e63;font-size:14px;margin-bottom:12px}
.info-list{
  background:#fff;border-radius:10px;padding:16px;text-align:left;
  margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)
}
.info-list li{padding:6px 0;color:#5d4037;font-size:15px;list-style:none}
.info-list li::before{content:'✅ '}
.big-btn{
  display:block;width:100%;max-width:320px;margin:0 auto;padding:16px 0;
  background:#c62828;color:#fff;border:none;border-radius:10px;
  font-size:18px;font-weight:700;cursor:pointer;text-align:center;
  box-shadow:0 3px 10px rgba(198,40,40,.3);-webkit-appearance:none
}
.big-btn:active{background:#8e0000;transform:scale(.97)}
.big-btn:disabled{background:#bdbdbd}
.hidden{display:none!important}

/* QUIZ */
.quiz-area{max-width:700px;margin:0 auto;padding:0 12px}
.status-bar{
  display:flex;align-items:center;gap:10px;background:#fff;
  border-radius:8px;padding:10px 14px;margin-bottom:10px;
  font-size:14px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06);
  position:sticky;top:48px;z-index:9
}
.status-bar .bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.status-bar .bar-fill{height:100%;background:#c62828;border-radius:3px;transition:width .3s}

.q-card{
  background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #c62828
}
.q-num{font-size:13px;color:#c62828;font-weight:700;margin-bottom:6px}
.q-text{font-size:16px;line-height:1.5;margin-bottom:12px}

.opt{
  display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:6px;
  border:2px solid #d7ccc8;border-radius:8px;cursor:pointer;background:#fafafa;
  transition:background .15s;-webkit-tap-highlight-color:transparent
}
.opt:active{background:#f5f5f5}
.opt .letter{
  width:34px;height:34px;border-radius:50%;background:#e0e0e0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;flex-shrink:0
}
.opt.chosen{border-color:#c62828;background:#ffebee}
.opt.chosen .letter{background:#c62828;color:#fff}
.opt.right{border-color:#2e7d32;background:#e8f5e9}
.opt.right .letter{background:#2e7d32;color:#fff}
.opt.wrong{border-color:#c62828;background:#ffebee}
.opt.wrong .letter{background:#c62828;color:#fff}

.nav-strip{
  display:flex;flex-wrap:wrap;gap:5px;background:#fff;
  border-radius:10px;padding:12px;margin-bottom:10px
}
.nav-dot{
  width:34px;height:34px;border-radius:50%;border:2px solid #d7ccc8;
  background:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer
}
.nav-dot.done{background:#c62828;color:#fff;border-color:#c62828}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;background:#fff;
  padding:10px 16px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:10;
  display:flex;justify-content:center
}
.bottom-bar button{
  width:100%;max-width:400px;padding:14px 0;background:#c62828;
  color:#fff;border:none;border-radius:8px;font-size:17px;
  font-weight:700;cursor:pointer;-webkit-appearance:none
}
.bottom-bar button:active{background:#8e0000}
.bottom-bar button:disabled{background:#bdbdbd}

/* RESULTS */
.result-area{max-width:600px;margin:0 auto;padding:0 16px}
.score-box{
  background:#fff;border-radius:12px;padding:24px;text-align:center;
  margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)
}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;margin:0 auto 12px;color:#fff;font-weight:700
}
.score-circle.ok{background:#2e7d32}
.score-circle.not{background:#c62828}
.score-num{font-size:40px}
.score-tag{font-size:14px}
.stat-row{display:flex;justify-content:center;gap:30px;margin:16px 0}
.stat{text-align:center}
.stat .val{font-size:24px;font-weight:700}
.stat .val.green{color:#2e7d32}
.stat .val.red{color:#c62828}
.stat .lbl{font-size:13px;color:#5d4037}

.review{
  background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)
}
.review.good{border-left:4px solid #2e7d32}
.review.bad{border-left:4px solid #c62828}
.review .rq{font-weight:600;margin-bottom:4px;font-size:15px}
.review .ra{font-size:14px;color:#5d4037}
.review .rc{font-size:14px;color:#2e7d32;font-weight:600}

.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.btn-row button{
  padding:12px 24px;border-radius:8px;font-size:15px;
  font-weight:700;cursor:pointer;border:none;-webkit-appearance:none
}
.btn-row .btn-red{background:#c62828;color:#fff}
.btn-row .btn-out{background:#fff;color:#c62828;border:2px solid #c62828}
.btn-row button:active{transform:scale(.96)}

@media(max-width:600px){
  .topbar{font-size:15px;padding:10px 12px}
  .intro h2{font-size:19px}
  .q-text{font-size:15px}
  .opt{padding:10px 12px;font-size:14px}
  .nav-dot{width:30px;height:30px;font-size:11px}
  .status-bar{font-size:13px;top:44px}
  .score-num{font-size:32px}
  .score-circle{width:100px;height:100px}
}

/* Post-submit explanation */
.explain{
  margin-top:12px;padding:12px 14px;border-radius:8px;
  font-size:14px;line-height:1.7
}
.explain.ok{border-left:4px solid #2e7d32;background:#e8f5e9}
.explain.bad{border-left:4px solid #c62828;background:#ffebee}
.explain.miss{border-left:4px solid #e65100;background:#fff8e1}
.exp-line{font-size:14px;padding:2px 0}
.exp-ok{color:#2e7d32}
.exp-bad,.exp-miss{color:#c62828}
.exp-correct{color:#2e7d32;font-weight:700}

/* Card result states */
.q-card.correct-card{border-left:4px solid #2e7d32!important;background:#f1f8e9}
.q-card.wrong-card{border-left:4px solid #c62828!important;background:#fff5f5}
.q-card.empty-card{border-left:4px solid #e65100!important;background:#fff8f0}

/* Inline result banner */
.result-banner{
  background:#fff;border-radius:10px;padding:20px;text-align:center;
  margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)
}
.result-banner h3{font-size:18px;color:#2c1810;margin:10px 0 4px}
.result-banner .stat-row{display:flex;justify-content:center;gap:28px;margin-top:12px}
.result-banner .stat .val{font-size:24px;font-weight:700}
.result-banner .stat .val.green{color:#2e7d32}
.result-banner .stat .val.red{color:#c62828}
.result-banner .stat .lbl{font-size:13px;color:#8d6e63}

/* Bottom bar button row */
.bottom-bar .btn-row{display:flex;gap:10px;justify-content:center}
.bottom-bar .btn-red{background:#c62828;color:#fff;padding:14px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:none;-webkit-appearance:none}
.bottom-bar .btn-out{background:#fff;color:#c62828;border:2px solid #c62828;padding:14px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.bottom-bar .btn-red:active,.bottom-bar .btn-out:active{transform:scale(.96)}</style>
</head>

<div class="topbar">★ Trắc Nghiệm Tư Tưởng Hồ Chí Minh</div>

  {"c":"5","q":"Câu nói về đại đoàn kết toàn dân tộc của Hồ Chí Minh tại Đại hội đại biểu Mặt trận Tổ quốc Việt Nam lần thứ 2 ngày 25/4/1961?","a":"Đoàn kết, đoàn kết, đại đoàn kết. Thành công, thành công, đại thành công.","d":["Đoàn kết, đoàn kết, đại đoàn kết. Thắng lợi, thắng lợi, đại thắng lợi.","Đoàn kết, đại đoàn kết, toàn dân đoàn kết. Thành công, thành công, đại thành công.","Toàn dân đoàn kết, đại đoàn kết, đoàn kết. Thành công, đại thành công, thắng lợi."]},
  {"c":"6","q":"Theo Hồ Chí Minh, văn hoá theo nghĩa rộng là gì?","a":"Sự tổng hợp mọi phương thức sinh hoạt của con người.","d":["Sự tổng hợp mọi phương thức sinh hoạt của xã hội.","Toàn bộ đời sống vật chất và tinh thần của con người.","Sự tổng hòa các giá trị vật chất và tinh thần của con người."]},
  {"c":"6","q":"Theo Hồ Chí Minh, các lĩnh vực văn hoá, chính trị, kinh tế, xã hội thì lĩnh vực nào là quan trọng nhất?","a":"Các lĩnh vực quan trọng ngang nhau.","d":["Chính trị là quan trọng nhất.","Kinh tế là quan trọng nhất.","Văn hóa là quan trọng nhất."]},
  {"c":"6","q":"Theo Hồ Chí Minh, văn hoá phải được đặt ngang hàng với lĩnh vực nào?","a":"Kinh tế, chính trị, xã hội.","d":["Kinh tế, chính trị, xã hội.","Chính trị, xã hội, kinh tế.","Xã hội, kinh tế, chính trị."]},

  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Kiệm\" của người cách mạng là gì?","a":"Không xa xỉ, không hoang phí, không bừa bãi.","d":["Siêng năng, chăm chỉ, cố gắng dẻo dai.","Trong sạch, không tham lam, không hủ hóa.","Thẳng thắn, đúng đắn, không gian dối."]},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Liêm\" của người cách mạng là gì?","a":"Trong sạch, không tham lam.","d":["Siêng năng, chăm chỉ, cố gắng dẻo dai.","Không xa xỉ, không hoang phí, không bừa bãi.","Thẳng thắn, đúng đắn, không gian dối."]},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Chính\" của người cách mạng là gì?","a":"Thẳng thắn, đúng đắn.","d":["Siêng năng, chăm chỉ, cố gắng dẻo dai.","Không xa xỉ, không hoang phí, không bừa bãi.","Trong sạch, không tham lam, không hủ hóa."]},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Chí công vô tư\" của người cách mạng là gì?","a":"Vì lợi ích chung, không vì lợi ích riêng.","d":["Siêng năng, chăm chỉ, cố gắng dẻo dai vì tập thể.","Trong sạch, không tham lam, đặt lợi ích tập thể lên trên.","Vì lợi ích của Đảng, không vì lợi ích cá nhân."]},
  {"c":"6","q":"Theo Hồ Chí Minh, đạo đức có vai trò như thế nào đối với người cách mạng?","a":"Là gốc, là nền tảng, là sức mạnh, là tiêu chuẩn hàng đầu của người cách mạng.","d":["Là gốc, là nền tảng, là động lực, là tiêu chuẩn hàng đầu của người cách mạng.","Là cội nguồn, là sức mạnh, là tiêu chuẩn, là nền tảng của người cách mạng.","Là nền tảng, là gốc rễ, là tiêu chuẩn, là phẩm chất của người cách mạng."]},
  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Nay ở trong thơ nên có thép. ... Cũng phải biết xung phong\".","a":"Nhà thơ.","d":["Chiến sĩ.","Nghệ sĩ.","Văn nghệ sĩ."]},

  {"c":"6","q":"Trung thành với sự nghiệp dựng nước và giữ nước, suốt đời phấn đấu cho Đảng, cho cách mạng. Đó là nội dung của chuẩn mực đạo đức nào?","a":"Trung với nước.","d":["Hiếu với dân.","Trung với Đảng.","Trung với nước, hiếu với dân."]},
  {"c":"6","q":"Theo Hồ Chí Minh, đức tính Cần phải đi liền với đức tính nào như hai chân của con người?","a":"Kiệm.","d":["Liêm.","Chính.","Chí công vô tư."]},
  {"c":"6","q":"Theo Hồ Chí Minh, đức tính Liêm phải đi liền với đức tính nào?","a":"Chính.","d":["Cần.","Kiệm.","Chí công vô tư."]},

  {"c":"6","q":"Chọn phương án SAI: Biểu hiện của văn hoá được đề cập trong định nghĩa văn hoá của Hồ Chí Minh (tháng 08 năm 1943) là:","a":"Chính trị.","d":["Kinh tế.","Xã hội.","Văn hóa."]},
  {"c":"6","q":"Đâu KHÔNG phải là nguồn gốc hình thành tư tưởng đạo đức Hồ Chí Minh?","a":"Tư tưởng đạo đức tư sản.","d":["Tư tưởng đạo đức phong kiến.","Tư tưởng đạo đức tôn giáo.","Tư tưởng đạo đức tiểu tư sản."]},

  {"c":"6","q":"Văn hoá là một mặt trận, tức là nói đến cuộc đấu tranh cách mạng trên lĩnh vực nào?","a":"Văn hoá, tư tưởng.","d":["Chính trị, tư tưởng.","Kinh tế, chính trị.","Văn hóa, giáo dục."]},

  {"c":"6","q":"Theo Hồ Chí Minh, mọi hoạt động văn hóa phải trở về với cuộc sống thực tại của quần chúng, phản ánh được tư tưởng và khát vọng của","a":"Quần chúng.","d":["Nhân dân.","Thực tiễn.","Quần chúng."]},

  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Một dân tộc dốt là một dân tộc ...\"","a":"Yếu.","d":["Hèn.","Kém.","Lạc hậu."]},

  {"c":"6","q":"Hồ Chí Minh viết: \"Đạo đức cũ như người đầu ngược xuống đất chân chổng lên trời. Đạo đức mới như người hai chân đứng vững được dưới đất, đầu ...\"","a":"Ngẩng lên trời.","d":["Ngẩng lên trời.","Ngước lên trời.","Vươn tới trời."]},
  {"c":"6","q":"Thương dân, tin dân, lắng nghe dân, phục vụ nhân dân hết lòng. Gần dân, kính trọng dân... Đó là nội dung của chuẩn mực đạo đức nào?","a":"Hiếu với dân.","d":["Trung với nước.","Trung với nước, hiếu với dân.","Trung với Đảng, hiếu với dân."]},
  {"c":"6","q":"Phẩm chất đạo đức gắn liền với hoạt động hàng ngày, là nội dung cốt lõi của đạo đức cách mạng?","a":"Cần, kiệm, liêm, chính, chí công vô tư.","d":["Trung với nước, hiếu với dân.","Cần, kiệm, liêm, chính.","Yêu thương con người, tinh thần quốc tế trong sáng."]},

  {"c":"6","q":"Tôn trọng, hiểu biết, thương yêu và đoàn kết với giai cấp vô sản toàn thế giới. Đó là nội dung của phẩm chất đạo đức nào?","a":"Tinh thần quốc tế trong sáng.","d":["Chủ nghĩa quốc tế trong sáng.","Tinh thần quốc tế vô sản.","Tình đoàn kết quốc tế trong sáng."]},

  {"c":"6","q":"Xoá bỏ tình trạng áp bức, bóc lột, nô dịch con người, làm cho mọi người được hưởng tự do, hạnh phúc, đó là nội dung giải phóng","a":"Con người.","d":["Xã hội.","Nhân dân.","Dân tộc."]},

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ---- LOAD QUESTIONS ----
function loadQuestions() {
  document.getElementById('btnStart').textContent = 'ĐANG TẢI...';
  document.getElementById('btnStart').disabled = true;
  questions = shuffle(QUESTIONS_DATA).slice(0, TOTAL_Q);
  buildOptions();
  startQuiz();
}

function buildOptions() {
  var allAnswers = questions.map(function(q) { return q.a; });
  options = questions.map(function(q) {
    if (q.d && q.d.length === 3) {
      return shuffle([q.a].concat(q.d));
    }
    var sameChapter = [];
    for (var k = 0; k < QUESTIONS_DATA.length; k++) {
      if (QUESTIONS_DATA[k].c === q.c && QUESTIONS_DATA[k].a !== q.a) {
        sameChapter.push(QUESTIONS_DATA[k].a);
      }
    }
    sameChapter = shuffle(sameChapter);
    var others = shuffle(allAnswers.filter(function(a) { return a !== q.a; }));
    var pool = sameChapter.concat(others);
    var seen = {};
    var distractors = [];
    for (var j = 0; j < pool.length && distractors.length < 3; j++) {
      if (!seen[pool[j]]) { seen[pool[j]] = true; distractors.push(pool[j]); }
    }
    return shuffle([q.a].concat(distractors));
  });
}

// ---- START QUIZ ----
function startQuiz() {
  answers = {};
  submitted = false;
  timeLeft = 3600;
  document.getElementById('pageIntro').classList.add('hidden');
  document.getElementById('pageQuiz').classList.remove('hidden');
  document.getElementById('pageResult').classList.add('hidden');
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnSubmit').textContent = '📝 NỘP BÀI';
  document.getElementById('lblTime').style.color = '';
  // Remove stale result banner
  var oldBanner = document.getElementById('resultBanner');
  if (oldBanner) oldBanner.parentNode.removeChild(oldBanner);
  // Reset bottom bar
  document.getElementById('bottomBar').innerHTML = '<button id="btnSubmit">📝 NỘP BÀI</button>';
  // Re-bind submit
  var bsu = document.getElementById('btnSubmit');
  bsu.addEventListener('click', function(e) { e.preventDefault(); doSubmit(); });
  bsu.addEventListener('touchend', function(e) { e.preventDefault(); doSubmit(); });
  renderNav();
  renderQuestions();
  updateStatus();
  startTimer();
  window.scrollTo(0, 0);
}

// ---- RENDER ----
function renderNav() {
  var html = '';
  for (var i = 0; i < questions.length; i++) {
    html += '<div class="nav-dot" data-nav="' + i + '">' + (i + 1) + '</div>';
  }
  document.getElementById('navStrip').innerHTML = html;
}

function renderQuestions() {
  var html = '';
  var letters = ['A', 'B', 'C', 'D'];
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var opts = options[i];
    html += '<div class="q-card" id="card' + i + '">';
    html += '<div class="q-num">Câu ' + (i + 1) + ' (Chương ' + q.c + ')</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    for (var j = 0; j < opts.length; j++) {
      html += '<div class="opt" data-qi="' + i + '" data-oi="' + j + '" id="opt' + i + '_' + j + '">';
      html += '<span class="letter">' + letters[j] + '</span>';
      html += '<span>' + opts[j] + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('qList').innerHTML = html;
}

// ---- EVENT DELEGATION ----
document.getElementById('qList').addEventListener('click', function(e) {
  if (submitted) return;
  var el = e.target;
  while (el && el !== this) {
    if (el.classList && el.classList.contains('opt')) {
      var qi = parseInt(el.getAttribute('data-qi'));
      var oi = parseInt(el.getAttribute('data-oi'));
      if (!isNaN(qi) && !isNaN(oi)) setAnswer(qi, oi);
      return;
    }
    el = el.parentNode;
  }
});

document.getElementById('navStrip').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.classList && el.classList.contains('nav-dot')) {
      var idx = parseInt(el.getAttribute('data-nav'));
      if (!isNaN(idx)) {
        var card = document.getElementById('card' + idx);
        if (card) card.scrollIntoView({behavior:'smooth',block:'center'});
      }
      return;
    }
    el = el.parentNode;
  }
});

function setAnswer(qi, oi) {
  answers[qi] = oi;
  var card = document.getElementById('card' + qi);
  var opts = card.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.remove('chosen');
  }
  var chosen = document.getElementById('opt' + qi + '_' + oi);
  if (chosen) chosen.classList.add('chosen');
  var dots = document.getElementById('navStrip').querySelectorAll('.nav-dot');
  if (dots[qi]) dots[qi].classList.add('done');
  updateStatus();
}

function updateStatus() {
  var count = Object.keys(answers).length;
  var pct = (count / questions.length) * 100;
  document.getElementById('lblCount').textContent = 'Đã làm: ' + count + '/' + questions.length;
  document.getElementById('barFill').style.width = pct + '%';
}

// ---- TIMER ----
function startTimer() {
  updateTimer();
  if (timerId) clearInterval(timerId);
  timerId = setInterval(function() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerId); doSubmit(); }
  }, 1000);
}

function updateTimer() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('lblTime').textContent = '⏱ ' + m + ':' + (s < 10 ? '0' : '') + s;
  if (timeLeft < 300) document.getElementById('lblTime').style.color = '#c62828';
}

// ---- SUBMIT ----
function doSubmit() {
  if (submitted) return;
  var unanswered = questions.length - Object.keys(answers).length;
  if (unanswered > 0 && timeLeft > 0) {
    if (!confirm('Bạn còn ' + unanswered + ' câu chưa trả lời. Nộp bài?')) return;
  }
  submitted = true;
  if (timerId) clearInterval(timerId);

  var correct = 0;
  var review = [];

  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var userOi = answers[i];
    var userAns = userOi !== undefined ? options[i][userOi] : '(Chưa trả lời)';
    var isOk = userAns === q.a;
    if (isOk) correct++;

    var card = document.getElementById('card' + i);
    var opts = card.querySelectorAll('.opt');
    for (var j = 0; j < opts.length; j++) {
      if (options[i][j] === q.a) opts[j].classList.add('right');
      if (j === userOi && !isOk) opts[j].classList.add('wrong');
    }
    // Card-level result styling
    if (userAns === '(Chưa trả lời)') {
      card.classList.add('empty-card');
    } else if (isOk) {
      card.classList.add('correct-card');
    } else {
      card.classList.add('wrong-card');
    }

    // Explanation below each question
    var explDiv = document.createElement('div');
    explDiv.className = 'explain';
    var explHTML = '';
    if (userAns === '(Chưa trả lời)') {
      explDiv.classList.add('miss');
      explHTML += '<div class="exp-line exp-miss">⚠ Bạn chưa chọn đáp án</div>';
    } else if (isOk) {
      explDiv.classList.add('ok');
      explHTML += '<div class="exp-line exp-ok">✅ Bạn đã chọn đúng: ' + userAns + '</div>';
    } else {
      explDiv.classList.add('bad');
      explHTML += '<div class="exp-line exp-bad">❌ Bạn chọn: ' + userAns + '</div>';
    }
    explHTML += '<div class="exp-line exp-correct">✓ Đáp án đúng: ' + q.a + '</div>';
    explDiv.innerHTML = explHTML;
    card.appendChild(explDiv);
    review.push({chapter:q.c, question:q.q, correct:q.a, yours:userAns, ok:isOk});
  }

  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('btnSubmit').textContent = '✅ ĐÃ NỘP';
  showResult(correct, review);
}

function showResult(correct, review) {
  // Keep quiz page visible with inline result banner
  var passed = correct >= 35;

  var bannerHTML = '<div class="result-banner" id="resultBanner">';
  bannerHTML += '<div class="score-circle ' + (passed ? 'ok' : 'not') + '">';
  bannerHTML += '<span class="score-num">' + correct + '/' + questions.length + '</span>';
  bannerHTML += '<span class="score-tag">' + (passed ? 'QUA MÔN' : 'TRƯỢT') + '</span>';
  bannerHTML += '</div>';
  bannerHTML += '<h3 style="font-size:22px;text-transform:uppercase;letter-spacing:1px">' + (passed ? 'QUA MÔN' : 'BẠN ĐÃ TRƯỢT MÔN NÀY') + '</h3>';
  bannerHTML += '<div class="stat-row">';
  bannerHTML += '<div class="stat"><div class="val green">' + correct + '</div><div class="lbl">Đúng</div></div>';
  bannerHTML += '<div class="stat"><div class="val red">' + (Object.keys(answers).length - correct) + '</div><div class="lbl">Sai</div></div>';
  bannerHTML += '<div class="stat"><div class="val" style="color:#e65100">' + (questions.length - Object.keys(answers).length) + '</div><div class="lbl">Chưa chọn</div></div>';
  bannerHTML += '<div class="stat"><div class="val">' + questions.length + '</div><div class="lbl">Tổng</div></div>';
  bannerHTML += '</div></div>';

  // Insert banner before question list
  var qList = document.getElementById('qList');
  var temp = document.createElement('div');
  temp.innerHTML = bannerHTML;
  qList.parentNode.insertBefore(temp.firstChild, qList);

  // Update bottom bar with retake + print
  document.getElementById('bottomBar').innerHTML =
    '<div class="btn-row">' +
    '<button class="btn-red" id="btnRetake2">🔄 LÀM LẠI</button>' +
    '<button class="btn-out" id="btnPrint2">🖨 IN</button>' +
    '</div>';

  document.getElementById('btnRetake2').addEventListener('click', loadQuestions);
  document.getElementById('btnRetake2').addEventListener('touchend', function(e){ e.preventDefault(); loadQuestions(); });
  document.getElementById('btnPrint2').addEventListener('click', function(){ window.print(); });
  document.getElementById('btnPrint2').addEventListener('touchend', function(e){ e.preventDefault(); window.print(); });

  window.scrollTo(0, 0);
}

// ---- BUTTON HANDLERS ----
function bindEvents() {
  var bs = document.getElementById('btnStart');
  var bsu = document.getElementById('btnSubmit');
  var br = document.getElementById('btnRetake');
  var bp = document.getElementById('btnPrint');
  if (!bs || !bsu || !br || !bp) { setTimeout(bindEvents, 50); return; }

  bs.addEventListener('click', function(e) { e.preventDefault(); loadQuestions(); });
  bs.addEventListener('touchend', function(e) { e.preventDefault(); loadQuestions(); });

  bsu.addEventListener('click', function(e) { e.preventDefault(); doSubmit(); });
  bsu.addEventListener('touchend', function(e) { e.preventDefault(); doSubmit(); });

  br.addEventListener('click', function(e) { e.preventDefault(); loadQuestions(); });
  br.addEventListener('touchend', function(e) { e.preventDefault(); loadQuestions(); });

  bp.addEventListener('click', function(e) { e.preventDefault(); window.print(); });
  bp.addEventListener('touchend', function(e) { e.preventDefault(); window.print(); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bindEvents);
} else {
  bindEvents();
}
</script>
