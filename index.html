<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trắc Nghiệm Tư Tưởng Hồ Chí Minh - C4,5,6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f0ebe3;color:#2c1810;min-height:100vh;padding-bottom:80px
}

/* TOP BAR */
.topbar{
  background:#b71c1c;color:#fff;padding:12px 16px;text-align:center;
  font-weight:700;font-size:17px;position:sticky;top:0;z-index:10;
  box-shadow:0 2px 6px rgba(0,0,0,.25)
}

/* INTRO */
.intro{max-width:600px;margin:24px auto;padding:0 16px;text-align:center}
.intro h2{color:#b71c1c;font-size:22px;margin-bottom:4px}
.intro .sub{color:#8d6e63;font-size:14px;margin-bottom:12px}
.info-list{
  background:#fff;border-radius:10px;padding:16px;text-align:left;
  margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)
}
.info-list li{padding:6px 0;color:#5d4037;font-size:15px;list-style:none}
.info-list li::before{content:'✅ '}
.big-btn{
  display:block;width:100%;max-width:320px;margin:0 auto;padding:16px 0;
  background:#c62828;color:#fff;border:none;border-radius:10px;
  font-size:18px;font-weight:700;cursor:pointer;text-align:center;
  box-shadow:0 3px 10px rgba(198,40,40,.3);-webkit-appearance:none
}
.big-btn:active{background:#8e0000;transform:scale(.97)}
.big-btn:disabled{background:#bdbdbd}
.hidden{display:none!important}

/* QUIZ */
.quiz-area{max-width:700px;margin:0 auto;padding:0 12px}
.status-bar{
  display:flex;align-items:center;gap:10px;background:#fff;
  border-radius:8px;padding:10px 14px;margin-bottom:10px;
  font-size:14px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06);
  position:sticky;top:48px;z-index:9
}
.status-bar .bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.status-bar .bar-fill{height:100%;background:#c62828;border-radius:3px;transition:width .3s}

.q-card{
  background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #c62828
}
.q-num{font-size:13px;color:#c62828;font-weight:700;margin-bottom:6px}
.q-text{font-size:16px;line-height:1.5;margin-bottom:12px}

.opt{
  display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:6px;
  border:2px solid #d7ccc8;border-radius:8px;cursor:pointer;background:#fafafa;
  transition:background .15s;-webkit-tap-highlight-color:transparent
}
.opt:active{background:#f5f5f5}
.opt .letter{
  width:34px;height:34px;border-radius:50%;background:#e0e0e0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;flex-shrink:0
}
.opt.chosen{border-color:#c62828;background:#ffebee}
.opt.chosen .letter{background:#c62828;color:#fff}
.opt.right{border-color:#2e7d32;background:#e8f5e9}
.opt.right .letter{background:#2e7d32;color:#fff}
.opt.wrong{border-color:#c62828;background:#ffebee}
.opt.wrong .letter{background:#c62828;color:#fff}

.nav-strip{
  display:flex;flex-wrap:wrap;gap:5px;background:#fff;
  border-radius:10px;padding:12px;margin-bottom:10px
}
.nav-dot{
  width:34px;height:34px;border-radius:50%;border:2px solid #d7ccc8;
  background:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer
}
.nav-dot.done{background:#c62828;color:#fff;border-color:#c62828}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;background:#fff;
  padding:10px 16px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:10;
  display:flex;justify-content:center
}
.bottom-bar button{
  width:100%;max-width:400px;padding:14px 0;background:#c62828;
  color:#fff;border:none;border-radius:8px;font-size:17px;
  font-weight:700;cursor:pointer;-webkit-appearance:none
}
.bottom-bar button:active{background:#8e0000}
.bottom-bar button:disabled{background:#bdbdbd}

/* RESULTS */
.result-area{max-width:600px;margin:0 auto;padding:0 16px}
.score-box{
  background:#fff;border-radius:12px;padding:24px;text-align:center;
  margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)
}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;margin:0 auto 12px;color:#fff;font-weight:700
}
.score-circle.ok{background:#2e7d32}
.score-circle.not{background:#c62828}
.score-num{font-size:40px}
.score-tag{font-size:14px}
.stat-row{display:flex;justify-content:center;gap:30px;margin:16px 0}
.stat{text-align:center}
.stat .val{font-size:24px;font-weight:700}
.stat .val.green{color:#2e7d32}
.stat .val.red{color:#c62828}
.stat .lbl{font-size:13px;color:#5d4037}

.review{
  background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)
}
.review.good{border-left:4px solid #2e7d32}
.review.bad{border-left:4px solid #c62828}
.review .rq{font-weight:600;margin-bottom:4px;font-size:15px}
.review .ra{font-size:14px;color:#5d4037}
.review .rc{font-size:14px;color:#2e7d32;font-weight:600}

.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.btn-row button{
  padding:12px 24px;border-radius:8px;font-size:15px;
  font-weight:700;cursor:pointer;border:none;-webkit-appearance:none
}
.btn-row .btn-red{background:#c62828;color:#fff}
.btn-row .btn-out{background:#fff;color:#c62828;border:2px solid #c62828}
.btn-row button:active{transform:scale(.96)}

@media(max-width:600px){
  .topbar{font-size:15px;padding:10px 12px}
  .intro h2{font-size:19px}
  .q-text{font-size:15px}
  .opt{padding:10px 12px;font-size:14px}
  .nav-dot{width:30px;height:30px;font-size:11px}
  .status-bar{font-size:13px;top:44px}
  .score-num{font-size:32px}
  .score-circle{width:100px;height:100px}
}

.exp-line{font-size:13px;padding:3px 0;margin-top:4px}
.exp-ok{color:#2e7d32}
.exp-bad,.exp-miss{color:#c62828}
.exp-correct{color:#2e7d32;font-weight:600}</style>
</head>
<body>

<div class="topbar">★ Trắc Nghiệm Tư Tưởng Hồ Chí Minh</div>

<!-- INTRO -->
<div id="pageIntro">

</div>

  {"c":"4","q":"Đảng Cộng sản trên thế giới được thành lập từ các yếu tố nào?","a":"Chủ nghĩa xã hội khoa học với phong trào công nhân."},
  {"c":"4","q":"Theo Hồ Chí Minh, Đảng Cộng sản Việt Nam được thành lập từ các yếu tố nào?","a":"Sự kết hợp chủ nghĩa Mác-Lênin với phong trào công nhân và phong trào yêu nước."},

  {"c":"4","q":"\"Đảng có vững, cách mệnh mới thành công, cũng như người cầm lái có vững thuyền mới chạy\". Đoạn trích trên trong tác phẩm nào?","a":"Đường cách mệnh."},

  {"c":"4","q":"Trong Di chúc, Chủ tịch Hồ Chí Minh yêu cầu giữ gìn sự đoàn kết, thống nhất trong Đảng như giữ gìn","a":"Con ngươi của mắt mình."},
  {"c":"4","q":"Theo Hồ Chí Minh, xây dựng đội ngũ cán bộ, đảng viên cần phải thế nào?","a":"Phải tuyệt đối trung thành với Đảng."},
  {"c":"4","q":"Khi chưa có chính quyền, nhiệm vụ chính trong các cuộc đấu tranh của dân tộc dưới sự lãnh đạo của Đảng là gì?","a":"Lật đổ chính quyền bè lũ thực dân và phong kiến, thiết lập chính quyền nhân dân."},

  {"c":"4","q":"Theo Chủ tịch Hồ Chí Minh nguyên tắc nào được coi là nguyên tắc tổ chức của Đảng?","a":"Tập trung dân chủ."},

  {"c":"4","q":"\"Phải thẳng thắn, chân thành, trung thực, không nể nang, không giấu giếm, không thêm bớt khuyết điểm\" nói về nguyên tắc nào?","a":"Tự phê bình và phê bình."},
  {"c":"4","q":"\"Nhiều người thì nhiều kinh nghiệm... Góp kinh nghiệm và sự xem xét của nhiều người, thì vấn đề đó được thấy rõ khắp mọi mặt\". Hồ Chí Minh nói về nguyên tắc nào?","a":"Tập thể lãnh đạo cá nhân phụ trách."},

  {"c":"5","q":"Nguyên tắc xây dựng và hoạt động của Mặt trận dân tộc thống nhất trong tư tưởng Hồ Chí Minh là gì?","a":"Phải đoàn kết lâu dài, chặt chẽ, đoàn kết thật sự, chân thành, thân ái giúp đỡ nhau cùng tiến bộ."},
  {"c":"5","q":"Hồ Chí Minh tuyên bố tại buổi lễ ra mắt Đảng Lao động Việt Nam (3/3/1951) về mục đích của Đảng là \"Đoàn kết toàn dân\" để làm gì?","a":"Phụng sự Tổ quốc."},
  {"c":"5","q":"Theo Hồ Chí Minh, lực lượng của khối đại đoàn kết toàn dân là?","a":"Toàn thể Nhân dân Việt Nam."},
  {"c":"5","q":"Trong mối quan hệ đoàn kết trong Đảng - đoàn kết trong nhân dân - đoàn kết quốc tế, đâu là nhân tố quyết định sức mạnh?","a":"Đoàn kết trong Đảng."},
  {"c":"5","q":"Theo Hồ Chí Minh đối với những đồng bào lầm đường, lạc lối, ta phải làm gì?","a":"Lấy tình thân ái mà cảm hoá."},
  {"c":"5","q":"Hồ Chí Minh đã kế thừa giá trị văn hoá nào của Việt Nam để hình thành tư tưởng về đại đoàn kết toàn dân?","a":"Yêu nước - đoàn kết - nhân nghĩa."},
  {"c":"5","q":"Theo Hồ Chí Minh, lực lượng nào là nền tảng của Mặt trận dân tộc thống nhất?","a":"Liên minh công nhân - nông dân."},
  {"c":"5","q":"Theo tư tưởng Hồ Chí Minh, một trong những nguyên tắc đoàn kết quốc tế đó là gì?","a":"Đoàn kết trên cơ sở độc lập tự chủ."},
  {"c":"5","q":"Tháng 09 năm 1947, Hồ Chí Minh tuyên bố chính sách đối ngoại của nước Việt Nam là \"làm bạn với tất cả mọi nước ... và không gây thù oán với một ai\".","a":"Dân chủ."},
  {"c":"5","q":"Yếu tố nào được xem là \"hạt nhân\" của khối đại đoàn kết toàn dân tộc trong tư tưởng Hồ Chí Minh?","a":"Sự đoàn kết và thống nhất trong Đảng Cộng sản Việt Nam."},
  {"c":"5","q":"Thực hiện tư tưởng Hồ Chí Minh, với phương châm \"cầu đồng tồn dị\", Đảng phải dựa trên cơ sở nào để xây dựng nguyên tắc đoàn kết dân tộc?","a":"Lấy cái chung để hạn chế cái riêng, cái khác biệt."},
  {"c":"5","q":"Thực hiện tư tưởng Hồ Chí Minh, làm tốt công tác vận động quần chúng là làm tốt điều gì?","a":"Dân vận."},
  {"c":"5","q":"Thực hiện tư tưởng Hồ Chí Minh, Đảng Cộng sản Việt Nam phải coi sức mạnh thời đại là:","a":"Sức mạnh của phong trào cách mạng thế giới, đó là chủ nghĩa Mác - Lênin."},
  {"c":"5","q":"Khi bàn về đại đoàn kết dân tộc, theo Hồ Chí Minh, nhân tố quyết định sự thành bại của cách mạng là gì?","a":"Chính sách, phương pháp và chủ trương tập hợp đại đoàn kết dân tộc."},
  {"c":"5","q":"Đảng Cộng sản Việt Nam luôn đề phòng, đấu tranh chống mọi biểu hiện gì để đoàn kết nội bộ?","a":"Khuynh hướng cô độc, hẹp hòi, đoàn kết một chiều, vô nguyên tắc."},
  {"c":"5","q":"Hồ Chí Minh viết năm 1942: \"Sử dạy cho ta bài học này: Lúc nào dân ta đoàn kết muôn người như một thì nước ta độc lập, tự do...\". Người muốn nhấn mạnh tới","a":"Vị trí, vai trò của đại đoàn kết toàn dân."},
  {"c":"5","q":"\"Đại đoàn kết tức là trước hết phải đoàn kết với đại đa số nhân dân... Đó là nền, gốc của đại đoàn kết...\". Hồ Chí Minh đã đề cập tới?","a":"Lực lượng của khối đại đoàn kết toàn dân."},
  {"c":"5","q":"Hồ Chí Minh khẳng định lực lượng nào là nền tảng của khối đại đoàn kết toàn dân?","a":"Liên minh công – nông – tầng lớp trí thức."},
  {"c":"5","q":"Với lực lượng đối lập, Chủ tịch Hồ Chí Minh có nghệ thuật xử lý khéo léo. Nhờ đó cách mạng Việt Nam giai đoạn 1945-1946:","a":"Tranh thủ khai thác tối đa mâu thuẫn trong hàng ngũ kẻ thù."},
  {"c":"5","q":"Theo Hồ Chí Minh, trong sự nghiệp cách mạng của Việt Nam \"muốn người ta giúp cho\" thì phải làm gì?","a":"Kêu gọi sự ủng hộ của các nước xã hội chủ nghĩa anh em."},
  {"c":"5","q":"Câu nói về đại đoàn kết toàn dân tộc của Hồ Chí Minh tại Đại hội đại biểu Mặt trận Tổ quốc Việt Nam lần thứ 2 ngày 25/4/1961?","a":"Đoàn kết, đoàn kết, đại đoàn kết. Thành công, thành công, đại thành công."},
  {"c":"6","q":"Theo Hồ Chí Minh, văn hoá theo nghĩa rộng là gì?","a":"Sự tổng hợp mọi phương thức sinh hoạt của con người."},
  {"c":"6","q":"Theo Hồ Chí Minh, các lĩnh vực văn hoá, chính trị, kinh tế, xã hội thì lĩnh vực nào là quan trọng nhất?","a":"Các lĩnh vực quan trọng ngang nhau."},
  {"c":"6","q":"Theo Hồ Chí Minh, văn hoá phải được đặt ngang hàng với lĩnh vực nào?","a":"Kinh tế, chính trị, xã hội."},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Cần\" của người cách mạng là gì?","a":"Siêng năng, chăm chỉ, cố gắng dẻo dai."},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Kiệm\" của người cách mạng là gì?","a":"Không xa xỉ, không hoang phí, không bừa bãi."},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Liêm\" của người cách mạng là gì?","a":"Trong sạch, không tham lam."},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Chính\" của người cách mạng là gì?","a":"Thẳng thắn, đúng đắn."},
  {"c":"6","q":"Theo Hồ Chí Minh, phẩm chất đạo đức \"Chí công vô tư\" của người cách mạng là gì?","a":"Vì lợi ích chung, không vì lợi ích riêng."},
  {"c":"6","q":"Theo Hồ Chí Minh, đạo đức có vai trò như thế nào đối với người cách mạng?","a":"Là gốc, là nền tảng, là sức mạnh, là tiêu chuẩn hàng đầu của người cách mạng."},
  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Nay ở trong thơ nên có thép. ... Cũng phải biết xung phong\".","a":"Nhà thơ."},
  {"c":"6","q":"Khi nói về vai trò của đạo đức, Hồ Chí Minh cho rằng đối với phương Đông một tấm gương sống còn có giá trị hơn","a":"100 bài diễn văn tuyên truyền."},
  {"c":"6","q":"Trung thành với sự nghiệp dựng nước và giữ nước, suốt đời phấn đấu cho Đảng, cho cách mạng. Đó là nội dung của chuẩn mực đạo đức nào?","a":"Trung với nước."},
  {"c":"6","q":"Theo Hồ Chí Minh, đức tính Cần phải đi liền với đức tính nào như hai chân của con người?","a":"Kiệm."},
  {"c":"6","q":"Theo Hồ Chí Minh, đức tính Liêm phải đi liền với đức tính nào?","a":"Chính."},
  {"c":"6","q":"Hồ Chí Minh viết: \"Trời có bốn mùa... Đất có bốn phương... Người có bốn đức: ...\"","a":"Cần, kiệm, liêm, chính."},
  {"c":"6","q":"Chọn phương án SAI: Biểu hiện của văn hoá được đề cập trong định nghĩa văn hoá của Hồ Chí Minh (tháng 08 năm 1943) là:","a":"Chính trị."},
  {"c":"6","q":"Đâu KHÔNG phải là nguồn gốc hình thành tư tưởng đạo đức Hồ Chí Minh?","a":"Tư tưởng đạo đức tư sản."},
  {"c":"6","q":"Trong tư tưởng Hồ Chí Minh, chữ NGƯỜI theo nghĩa hẹp là gì?","a":"Gia đình, anh em, họ hàng, bầu bạn."},
  {"c":"6","q":"Khái niệm con người trong tư tưởng Hồ Chí Minh để chỉ","a":"Con người cụ thể gắn với hoàn cảnh lịch sử cụ thể."},
  {"c":"6","q":"Theo tư tưởng Hồ Chí Minh, con người trong giải phóng dân tộc là","a":"Cả cộng đồng dân tộc Việt Nam."},
  {"c":"6","q":"Theo tư tưởng Hồ Chí Minh, con người trong giải phóng con người ở phạm vi thế giới là","a":"Loài người."},
  {"c":"6","q":"Sau Cách mạng Tháng Tám, văn hoá được Hồ Chí Minh xác định là","a":"Toàn bộ đời sống tinh thần của xã hội, thuộc về kiến trúc thượng tầng."},
  {"c":"6","q":"Theo Hồ Chí Minh, văn hoá là thuộc về","a":"Kiến trúc thượng tầng."},
  {"c":"6","q":"Quan hệ giữa văn hoá với chính trị, theo Hồ Chí Minh văn hoá phải ở vị trí nào so với chính trị?","a":"Trong."},
  {"c":"6","q":"\"Giải phóng chính trị đồng nghĩa với giải phóng xã hội, từ đó văn hóa mới có điều kiện phát triển\". Đó là mối quan hệ giữa văn hoá với lĩnh vực nào?","a":"Xã hội."},
  {"c":"6","q":"Theo Hồ Chí Minh, muốn tiến lên chủ nghĩa xã hội thì phải phát triển","a":"Kinh tế và văn hoá."},
  {"c":"6","q":"Tính chất của nền văn hoá Việt Nam thời kỳ cách mạng dân tộc dân chủ nhân dân trong Đề cương văn hoá năm 1943 là gì?","a":"Dân tộc, khoa học, đại chúng."},
  {"c":"6","q":"Vai trò của văn hoá đạo đức, lối sống là gì?","a":"Nâng cao phẩm giá, phong cách lành mạnh cho con người, hướng con người tới các giá trị chân, thiện, mỹ."},
  {"c":"6","q":"Văn hoá là một mặt trận, tức là nói đến cuộc đấu tranh cách mạng trên lĩnh vực nào?","a":"Văn hoá, tư tưởng."},
  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Văn hoá nghệ thuật cũng là một mặt trận. Anh chị em là chiến sĩ trên mặt trận ấy\". Anh chị em ở đây là nói đến ai?","a":"Văn nghệ sĩ."},
  {"c":"6","q":"Theo Hồ Chí Minh, để làm tròn nhiệm vụ phụng sự Tổ quốc, chiến sĩ nghệ thuật phải","a":"Có lập trường, tư tưởng vững vàng."},
  {"c":"6","q":"Theo Hồ Chí Minh, mọi hoạt động văn hóa phải trở về với cuộc sống thực tại của quần chúng, phản ánh được tư tưởng và khát vọng của","a":"Quần chúng."},
  {"c":"6","q":"Hồ Chí Minh cho rằng: \"Văn hóa ... cho quốc dân đi\".","a":"Soi đường."},
  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Một dân tộc dốt là một dân tộc ...\"","a":"Yếu."},
  {"c":"6","q":"Vai trò của người nghệ sĩ trong lĩnh vực văn hoá văn nghệ theo tư tưởng Hồ Chí Minh là","a":"Người chiến sĩ."},
  {"c":"6","q":"Theo tư tưởng Hồ Chí Minh, đời sống văn hoá mới không bao gồm những mặt nào?","a":"Cách sống mới."},
  {"c":"6","q":"Trong tác phẩm Sửa đổi lối làm việc, Hồ Chí Minh viết: \"Người cách mạng phải có ..., không có ... thì dù tài giỏi mấy cũng không lãnh đạo được nhân dân\".","a":"Đạo đức."},
  {"c":"6","q":"Theo Hồ Chí Minh, cán bộ lấy tiêu chuẩn nào làm cốt cán?","a":"Đạo đức."},
  {"c":"6","q":"Theo Hồ Chí Minh, nếu không có đạo đức cách mạng thì có tài cũng","a":"Vô dụng."},
  {"c":"6","q":"Hồ Chí Minh viết: \"Đạo đức cũ như người đầu ngược xuống đất chân chổng lên trời. Đạo đức mới như người hai chân đứng vững được dưới đất, đầu ...\"","a":"Ngẩng lên trời."},
  {"c":"6","q":"Thương dân, tin dân, lắng nghe dân, phục vụ nhân dân hết lòng. Gần dân, kính trọng dân... Đó là nội dung của chuẩn mực đạo đức nào?","a":"Hiếu với dân."},
  {"c":"6","q":"Phẩm chất đạo đức gắn liền với hoạt động hàng ngày, là nội dung cốt lõi của đạo đức cách mạng?","a":"Cần, kiệm, liêm, chính, chí công vô tư."},
  {"c":"6","q":"Theo Hồ Chí Minh, chủ nghĩa quốc tế vô sản phải gắn liền với","a":"Chủ nghĩa yêu nước chân chính."},
  {"c":"6","q":"Đâu KHÔNG phải là nguyên tắc xây dựng đạo đức mới theo Hồ Chí Minh?","a":"Trung với nước, hiếu với dân."},
  {"c":"6","q":"Tôn trọng, hiểu biết, thương yêu và đoàn kết với giai cấp vô sản toàn thế giới. Đó là nội dung của phẩm chất đạo đức nào?","a":"Tinh thần quốc tế trong sáng."},
  {"c":"6","q":"Theo tư tưởng đạo đức Hồ Chí Minh, nguyên nhân nào đẻ ra mọi thói hư, tật xấu?","a":"Chủ nghĩa cá nhân."},
  {"c":"6","q":"Đâu KHÔNG phải là phẩm chất cơ bản của con người Việt Nam trong thời đại mới theo tư tưởng Hồ Chí Minh?","a":"Nhân, lễ, nghĩa, trí, dũng."},
  {"c":"6","q":"Xoá bỏ tình trạng áp bức, bóc lột, nô dịch con người, làm cho mọi người được hưởng tự do, hạnh phúc, đó là nội dung giải phóng","a":"Con người."},
  {"c":"6","q":"Theo Hồ Chí Minh, nhân tố nào được xem là vốn quý nhất, là động lực, là nhân tố quyết định thành công của sự nghiệp cách mạng?","a":"Con người."},
  {"c":"6","q":"Hồ Chí Minh khẳng định: \"Trong bầu trời không gì quý bằng ..., trong thế giới không gì mạnh bằng sức mạnh đoàn kết của ...\".","a":"Nhân dân."},
  {"c":"6","q":"Con người theo quan niệm của Hồ Chí Minh là","a":"Động lực của cách mạng."},
  {"c":"6","q":"Theo Hồ Chí Minh, muốn xây dựng chủ nghĩa xã hội, trước hết cần phải có con người","a":"Xã hội chủ nghĩa."},
  {"c":"6","q":"Xây dựng con người toàn diện vừa \"hồng\" vừa \"chuyên\". Đây là tư tưởng nào của Hồ Chí Minh về con người?","a":"Nội dung xây dựng con người."},
  {"c":"6","q":"Đâu KHÔNG phải là khía cạnh chủ yếu để xây dựng con người toàn diện theo tư tưởng Hồ Chí Minh?","a":"Có ý thức làm chủ, tư tưởng cá nhân trên hết."},
  {"c":"6","q":"\"Trong bầu trời không gì quí bằng nhân dân. Trong thế giới không gì mạnh bằng lực lượng đoàn kết của nhân dân\". Đó chính là","a":"Coi nhân dân là nguồn gốc của mọi sức mạnh."},
  {"c":"6","q":"Nội dung cốt lõi của bản sắc văn hóa dân tộc Việt Nam là gì?","a":"Lòng yêu nước, tinh thần độc lập, tự cường, tự tôn dân tộc."},
  {"c":"6","q":"Bản sắc văn hóa dân tộc Việt Nam có hình thức gì?","a":"Cốt cách, đặc tính, ngôn ngữ, phong tục, tập quán."},
  {"c":"6","q":"Theo Hồ Chí Minh, mối quan hệ giữa văn hóa với chính trị là gì?","a":"Sự giải phóng chính trị mở đường cho văn hóa phát triển."},
  {"c":"6","q":"Vai trò của văn hóa pháp luật là","a":"Đảm bảo dân chủ, trật tự, kỷ cương, phép nước."},
  {"c":"6","q":"Động lực của văn hóa đạo đức là","a":"Hướng con người đến các giá trị chân, thiện, mỹ."},
  {"c":"6","q":"Trong tác phẩm Sửa đổi lối làm việc (1947), Hồ Chí Minh chỉ ra hậu quả của việc người cách mạng không có đạo đức sẽ","a":"Không lãnh đạo được nhân dân."},
  {"c":"6","q":"Trong tác phẩm \"Người cán bộ cách mạng\" (1955), Hồ Chí Minh ví \"mọi việc thành công hay thất bại\" là do","a":"Cán bộ có thấm nhuần đạo đức cách mạng hay là không."},
  {"c":"6","q":"Hồ Chí Minh quan tâm tới giáo dục toàn diện cho các em học sinh, sinh viên về:","a":"Đức, trí, thể, mỹ."},
  {"c":"6","q":"Theo Hồ Chí Minh, hiểu chủ nghĩa Mác – Lênin để","a":"Sống với nhau có tình có nghĩa."},
  {"c":"6","q":"Theo Hồ Chí Minh, \"Bốn phương vô sản đều là...\"?","a":"Anh em."},

  {"c":"6","q":"Theo Hồ Chí Minh, sinh viên \"học để làm việc, làm người, làm cán bộ, muốn đạt được mục đích ấy phải ...\"?","a":"Cần, kiệm, liêm, chính, chí công vô tư."},

  {"c":"6","q":"Vai trò của tác phẩm văn nghệ trong lĩnh vực văn hoá văn nghệ theo tư tưởng Hồ Chí Minh?","a":"Là vũ khí sắc bén trong đấu tranh cách mạng, xây dựng xã hội mới, con người mới."},
  {"c":"6","q":"Vấn đề xây dựng đời sống mới được Hồ Chí Minh đặt ra từ khi nào?","a":"Sau Cách mạng Tháng Tám năm 1945."},
  {"c":"6","q":"Những căn bệnh trong bộ máy nhà nước mà Hồ Chí Minh gọi là \"giặc nội xâm\"?","a":"Tham ô, lãng phí, quan liêu."},
  {"c":"6","q":"Theo Hồ Chí Minh, việc tu dưỡng đạo đức ở mỗi người phải được thực hiện trong","a":"Mọi hoạt động thực tiễn, mọi mối quan hệ xã hội."},
  {"c":"6","q":"Cuộc vận động \"Đẩy mạnh học tập và làm theo tư tưởng, đạo đức, phong cách Hồ Chí Minh\" được thực hiện theo Chỉ thị nào?","a":"Chỉ thị 05-CT/TW của Bộ Chính trị khóa XII."},

  {"c":"6","q":"\"Đối với mình, không tự cao tự đại... Đối với người, không nịnh hót... Đối với việc, để việc công lên trên việc tư...\". Đó là nội dung của đức tính nào?","a":"Chính."},
  {"c":"6","q":"\"Không xa xỉ, không hoang phí, không bừa bãi\". Đó là nội dung của đức tính nào?","a":"Kiệm."},
  {"c":"6","q":"\"Lao động siêng năng, lao động có kế hoạch, sáng tạo, có năng suất cao\". Đó là nội dung của đức tính nào?","a":"Cần."},
  {"c":"6","q":"\"Làm việc gì cũng vì lợi ích chung, không vì cá nhân... công tâm luôn đặt lợi ích của Đảng, của nhân dân lên trên hết\". Đó là phẩm chất đạo đức nào?","a":"Chí công vô tư."}
];

// ---- STATE ----
var TOTAL_Q = 50;
var questions = [];
var options = [];
var answers = {};
var timeLeft = 3600;
var timerId = null;
var submitted = false;

// ---- HELPERS ----
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ---- LOAD QUESTIONS ----
function loadQuestions() {
  document.getElementById('btnStart').textContent = 'ĐANG TẢI...';
  document.getElementById('btnStart').disabled = true;
  questions = shuffle(QUESTIONS_DATA).slice(0, TOTAL_Q);
  buildOptions();
  startQuiz();
}

function buildOptions() {
  var allAnswers = questions.map(function(q) { return q.a; });
  options = questions.map(function(q) {
    var others = allAnswers.filter(function(a) { return a !== q.a; });
    var distractors = shuffle(others).slice(0, 3);
    return shuffle([q.a].concat(distractors));
  });
}

// ---- START QUIZ ----
function startQuiz() {
  answers = {};
  submitted = false;
  timeLeft = 3600;
  document.getElementById('pageIntro').classList.add('hidden');
  document.getElementById('pageQuiz').classList.remove('hidden');
  document.getElementById('pageResult').classList.add('hidden');
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnSubmit').textContent = '📝 NỘP BÀI';
  document.getElementById('lblTime').style.color = '';
  renderNav();
  renderQuestions();
  updateStatus();
  startTimer();
  window.scrollTo(0, 0);
}

// ---- RENDER ----
function renderNav() {
  var html = '';
  for (var i = 0; i < questions.length; i++) {
    html += '<div class="nav-dot" data-nav="' + i + '">' + (i + 1) + '</div>';
  }
  document.getElementById('navStrip').innerHTML = html;
}

function renderQuestions() {
  var html = '';
  var letters = ['A', 'B', 'C', 'D'];
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var opts = options[i];
    html += '<div class="q-card" id="card' + i + '">';
    html += '<div class="q-num">Câu ' + (i + 1) + ' (Chương ' + q.c + ')</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    for (var j = 0; j < opts.length; j++) {
      html += '<div class="opt" data-qi="' + i + '" data-oi="' + j + '" id="opt' + i + '_' + j + '">';
      html += '<span class="letter">' + letters[j] + '</span>';
      html += '<span>' + opts[j] + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('qList').innerHTML = html;
}

// ---- EVENT DELEGATION ----
document.getElementById('qList').addEventListener('click', function(e) {
  if (submitted) return;
  var el = e.target;
  while (el && el !== this) {
    if (el.classList && el.classList.contains('opt')) {
      var qi = parseInt(el.getAttribute('data-qi'));
      var oi = parseInt(el.getAttribute('data-oi'));
      if (!isNaN(qi) && !isNaN(oi)) setAnswer(qi, oi);
      return;
    }
    el = el.parentNode;
  }
});

document.getElementById('navStrip').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.classList && el.classList.contains('nav-dot')) {
      var idx = parseInt(el.getAttribute('data-nav'));
      if (!isNaN(idx)) {
        var card = document.getElementById('card' + idx);
        if (card) card.scrollIntoView({behavior:'smooth',block:'center'});
      }
      return;
    }
    el = el.parentNode;
  }
});

function setAnswer(qi, oi) {
  answers[qi] = oi;
  var card = document.getElementById('card' + qi);
  var opts = card.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.remove('chosen');
  }
  var chosen = document.getElementById('opt' + qi + '_' + oi);
  if (chosen) chosen.classList.add('chosen');
  var dots = document.getElementById('navStrip').querySelectorAll('.nav-dot');
  if (dots[qi]) dots[qi].classList.add('done');
  updateStatus();
}

function updateStatus() {
  var count = Object.keys(answers).length;
  var pct = (count / questions.length) * 100;
  document.getElementById('lblCount').textContent = 'Đã làm: ' + count + '/' + questions.length;
  document.getElementById('barFill').style.width = pct + '%';
}

// ---- TIMER ----
function startTimer() {
  updateTimer();
  if (timerId) clearInterval(timerId);
  timerId = setInterval(function() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerId); doSubmit(); }
  }, 1000);
}

function updateTimer() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('lblTime').textContent = '⏱ ' + m + ':' + (s < 10 ? '0' : '') + s;
  if (timeLeft < 300) document.getElementById('lblTime').style.color = '#c62828';
}

// ---- SUBMIT ----
function doSubmit() {
  if (submitted) return;
  var unanswered = questions.length - Object.keys(answers).length;
  if (unanswered > 0 && timeLeft > 0) {
    if (!confirm('Bạn còn ' + unanswered + ' câu chưa trả lời. Nộp bài?')) return;
  }
  submitted = true;
  if (timerId) clearInterval(timerId);

  var correct = 0;
  var review = [];

  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var userOi = answers[i];
    var userAns = userOi !== undefined ? options[i][userOi] : '(Chưa trả lời)';
    var isOk = userAns === q.a;
    if (isOk) correct++;

    var card = document.getElementById('card' + i);
    var opts = card.querySelectorAll('.opt');
    for (var j = 0; j < opts.length; j++) {
      if (options[i][j] === q.a) opts[j].classList.add('right');
      if (j === userOi && !isOk) opts[j].classList.add('wrong');
    }
        // Explanation below each question
    var explDiv = document.createElement('div');
    explDiv.className = 'explain';
    var explHTML = '';
    if (userAns === '(Chưa trả lời)') {
      explHTML += '<div class="exp-line exp-miss">⚠ Bạn chưa chọn đáp án</div>';
    } else if (isOk) {
      explHTML += '<div class="exp-line exp-ok">✅ Bạn chọn: ' + userAns + '</div>';
    } else {
      explHTML += '<div class="exp-line exp-bad">❌ Bạn chọn: ' + userAns + '</div>';
    }
    explHTML += '<div class="exp-line exp-correct">✓ Đáp án đúng: ' + q.a + '</div>';
    explDiv.innerHTML = explHTML;
    card.appendChild(explDiv);
    review.push({chapter:q.c, question:q.q, correct:q.a, yours:userAns, ok:isOk});
  }

  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('btnSubmit').textContent = '✅ ĐÃ NỘP';
  showResult(correct, review);
}

function showResult(correct, review) {
  document.getElementById('pageQuiz').classList.add('hidden');
  document.getElementById('pageResult').classList.remove('hidden');

  var score = Math.round((correct / questions.length) * 100);
  var passed = score >= 50;
  var html = '';

  html += '<div class="score-box">';
  html += '<div class="score-circle ' + (passed ? 'ok' : 'not') + '">';
  html += '<span class="score-num">' + correct + '/' + questions.length + '</span>';
  html += '<span class="score-tag">' + (passed ? 'ĐẠT' : 'CHƯA ĐẠT') + '</span>';
  html += '</div>';
  html += '<h3>' + (passed ? '🎉 Chúc mừng!' : '💪 Cố gắng lần sau!') + '</h3>';
  html += '<div class="stat-row">';
  html += '<div class="stat"><div class="val green">' + correct + '</div><div class="lbl">Đúng</div></div>';
  html += '<div class="stat"><div class="val red">' + (questions.length - correct) + '</div><div class="lbl">Sai</div></div>';
  html += '<div class="stat"><div class="val">' + questions.length + '</div><div class="lbl">Tổng</div></div>';
  html += '</div></div>';

  html += '<h3 style="margin:16px 0 8px">📋 Xem lại:</h3>';
  for (var i = 0; i < review.length; i++) {
    var r = review[i];
    html += '<div class="review ' + (r.ok ? 'good' : 'bad') + '">';
    html += '<div class="rq">Câu ' + (i + 1) + ' (C' + r.chapter + '): ' + r.question + '</div>';
    html += '<div class="ra">Bạn chọn: ' + r.yours + '</div>';
    if (!r.ok) html += '<div class="rc">✓ Đáp án: ' + r.correct + '</div>';
    html += '</div>';
  }

  document.getElementById('resultContent').innerHTML = html;
  window.scrollTo(0, 0);
}

// ---- BUTTON HANDLERS ----
function bindEvents() {
  var bs = document.getElementById('btnStart');
  var bsu = document.getElementById('btnSubmit');
  var br = document.getElementById('btnRetake');
  var bp = document.getElementById('btnPrint');
  if (!bs || !bsu || !br || !bp) { setTimeout(bindEvents, 50); return; }

  bs.addEventListener('click', function(e) { e.preventDefault(); loadQuestions(); });
  bs.addEventListener('touchend', function(e) { e.preventDefault(); loadQuestions(); });

  bsu.addEventListener('click', function(e) { e.preventDefault(); doSubmit(); });
  bsu.addEventListener('touchend', function(e) { e.preventDefault(); doSubmit(); });

  br.addEventListener('click', function(e) { e.preventDefault(); loadQuestions(); });
  br.addEventListener('touchend', function(e) { e.preventDefault(); loadQuestions(); });

  bp.addEventListener('click', function(e) { e.preventDefault(); window.print(); });
  bp.addEventListener('touchend', function(e) { e.preventDefault(); window.print(); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bindEvents);
} else {
  bindEvents();
}
</script>
